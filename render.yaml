services:
  - type: web
    name: kryros-backend
    env: node
    region: oregon
    rootDir: Backend
    buildCommand: npm install && npm install @nestjs/cli && npx prisma generate && npx nest build
    # Security: use prisma migrate deploy (safe, idempotent) instead of
    # prisma db push --accept-data-loss which could silently delete production data.
    startCommand: npx prisma migrate deploy && node dist/main.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      # Security: AES-256-GCM key for encrypting 2FA secrets at rest.
      # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      # Then set this value in the Render dashboard (never commit it).
      - key: TOTP_ENCRYPTION_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=1024
      - key: CORS_ORIGINS
        value: https://kryros.com,https://www.kryros.com,https://kryros-interface.onrender.com,https://kryrosadmin-iqcj.onrender.com
      - key: FRONTEND_URL
        value: https://kryros.com

  - type: web
    name: kryros-user-ui
    env: node
    region: oregon
    rootDir: Frontend/User-UI
    buildCommand: npx --yes pnpm@10 install --no-frozen-lockfile && npx pnpm@10 --filter @workspace/kryros run build
    startCommand: npx pnpm@10 --filter @workspace/kryros run serve
    envVars:
      - key: PORT
        value: "5000"
      - key: BASE_PATH
        value: "/"
      - key: NODE_OPTIONS
        value: --max-old-space-size=1024
      - key: VITE_API_URL
        value: https://kryrosbackend-rwb2.onrender.com

  - type: web
    name: kryros-admin
    env: node
    region: oregon
    rootDir: Frontend/Admi-Panel
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://kryrosbackend-rwb2.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=1024
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # Cloudinary credentials — needed by the BFF upload-signature route
      # Set these values in Render dashboard (never commit actual secrets)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
