<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYROS Auth Pages Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold">
                <span class="text-gray-900">KRY</span><span class="text-teal-600">ROS</span>
            </h1>
        </div>

        <!-- Tab Navigation -->
        <div class="bg-gray-100 rounded-lg p-1 mb-8 flex gap-1">
            <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2 px-3 rounded-md font-medium transition-all bg-teal-600 text-white">
                Login
            </button>
            <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-2 px-3 rounded-md font-medium transition-all text-gray-600 hover:text-gray-900">
                Register
            </button>
            <button onclick="switchTab('forgot')" id="tab-forgot" class="flex-1 py-2 px-3 rounded-md font-medium transition-all text-gray-600 hover:text-gray-900">
                Forgot
            </button>
        </div>

        <!-- Content Container -->
        <div class="min-h-96">
            <!-- LOGIN PAGE -->
            <div id="login-content" class="space-y-6">
                <!-- Email Field -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 mb-2">Email or Phone</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-teal-600"></i>
                        <input type="text" placeholder="Enter your email or phone number" class="w-full pl-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-600"></i>
                        <input type="password" id="login-password" placeholder="Enter your password" class="w-full pl-12 pr-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                        <button type="button" onclick="togglePassword('login-password', 'login-eye')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <i class="fas fa-eye" id="login-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-teal-600 focus:ring-teal-600">
                        <span class="ml-2 text-sm text-gray-600">Remember me</span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button onclick="showAlert('Login submitted!')" class="w-full h-12 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-lg transition-colors">
                    Login
                </button>

                <!-- Footer -->
                <div class="text-center text-sm text-gray-600">
                    <p>Don't have an account? <a href="javascript:void(0)" onclick="switchTab('register')" class="text-teal-600 font-semibold hover:underline">Register here</a></p>
                </div>
            </div>

            <!-- REGISTER PAGE -->
            <div id="register-content" class="space-y-5 hidden">
                <!-- Full Name -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 mb-2">Full Name</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-600"></i>
                        <input type="text" placeholder="Enter your full name" class="w-full pl-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 mb-2">Email or Phone</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-600"></i>
                        <input type="text" placeholder="Enter your email or phone number" class="w-full pl-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-600"></i>
                        <input type="password" id="register-password" placeholder="Create a password" class="w-full pl-12 pr-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                        <button type="button" onclick="togglePassword('register-password', 'register-eye')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <i class="fas fa-eye" id="register-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 mb-2">Confirm Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-600"></i>
                        <input type="password" id="register-confirm" placeholder="Confirm your password" class="w-full pl-12 pr-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                        <button type="button" onclick="togglePassword('register-confirm', 'register-confirm-eye')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <i class="fas fa-eye" id="register-confirm-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Captcha -->
                <div class="border border-gray-300 rounded-lg p-4 bg-gray-50">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <input type="checkbox" id="captcha" class="w-5 h-5 rounded border-gray-300 text-teal-600 cursor-pointer">
                            <label for="captcha" class="text-sm text-gray-700 font-medium cursor-pointer">Verify you are human</label>
                        </div>
                        <div class="text-right text-xs">
                            <p class="font-semibold text-gray-900">CLOUDFLARE</p>
                            <div class="flex gap-1 text-gray-600 text-xs">
                                <a href="javascript:void(0)" class="hover:underline">Privacy</a>
                                <span>•</span>
                                <a href="javascript:void(0)" class="hover:underline">Terms</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Terms -->
                <div class="flex items-start">
                    <input type="checkbox" id="terms" class="w-4 h-4 rounded border-gray-300 text-teal-600 mt-1">
                    <label for="terms" class="ml-2 text-sm text-gray-600">
                        I agree to the <a href="javascript:void(0)" class="text-teal-600 font-semibold hover:underline">Terms and Conditions</a>
                    </label>
                </div>

                <!-- Submit -->
                <button onclick="showAlert('Account created!')" class="w-full h-12 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-lg transition-colors">
                    Create account
                </button>

                <!-- Footer -->
                <div class="text-center text-sm text-gray-600">
                    <p>Already have an account? <a href="javascript:void(0)" onclick="switchTab('login')" class="text-teal-600 font-semibold hover:underline">Login here</a></p>
                </div>
            </div>

            <!-- FORGOT PASSWORD PAGE -->
            <div id="forgot-content" class="space-y-6 hidden">
                <div id="forgot-step-1">
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                        <p class="text-sm text-blue-800">Enter your email address and we'll send you a link to reset your password.</p>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-900 mb-2">Email or Phone</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-600"></i>
                            <input type="text" id="forgot-email" placeholder="Enter your email or phone number" class="w-full pl-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                        </div>
                    </div>

                    <!-- Submit -->
                    <button onclick="goToForgotStep2()" class="w-full h-12 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-lg transition-colors mt-6 flex items-center justify-center gap-2">
                        Send Reset Link
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <!-- Footer -->
                    <div class="text-center text-sm text-gray-600 mt-6">
                        <p>Remember your password? <a href="javascript:void(0)" onclick="switchTab('login')" class="text-teal-600 font-semibold hover:underline">Login here</a></p>
                    </div>
                </div>

                <div id="forgot-step-2" class="hidden">
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6">
                        <p class="text-sm text-green-800">Check your email for the verification code and enter it below.</p>
                    </div>

                    <!-- Code -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-900 mb-2">Verification Code</label>
                        <input type="text" maxlength="6" placeholder="000000" class="w-full h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none text-center text-lg tracking-widest">
                    </div>

                    <!-- New Password -->
                    <div class="mt-4">
                        <label class="block text-sm font-semibold text-gray-900 mb-2">New Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-600"></i>
                            <input type="password" id="forgot-new-password" placeholder="Create new password" class="w-full pl-12 pr-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                            <button type="button" onclick="togglePassword('forgot-new-password', 'forgot-eye-1')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                <i class="fas fa-eye" id="forgot-eye-1"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mt-4">
                        <label class="block text-sm font-semibold text-gray-900 mb-2">Confirm Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-600"></i>
                            <input type="password" id="forgot-confirm-password" placeholder="Confirm new password" class="w-full pl-12 pr-12 h-12 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none">
                            <button type="button" onclick="togglePassword('forgot-confirm-password', 'forgot-eye-2')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                <i class="fas fa-eye" id="forgot-eye-2"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button onclick="showAlert('Password reset successfully!')" class="w-full h-12 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-lg transition-colors mt-6">
                        Reset Password
                    </button>

                    <!-- Back -->
                    <button onclick="goToForgotStep1()" class="w-full h-12 border-2 border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-50 mt-3">
                        Back
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // Hide all contents
            document.getElementById('login-content').classList.add('hidden');
            document.getElementById('register-content').classList.add('hidden');
            document.getElementById('forgot-content').classList.add('hidden');

            // Remove all active button styles
            document.getElementById('tab-login').classList.remove('bg-teal-600', 'text-white');
            document.getElementById('tab-register').classList.remove('bg-teal-600', 'text-white');
            document.getElementById('tab-forgot').classList.remove('bg-teal-600', 'text-white');

            document.getElementById('tab-login').classList.add('text-gray-600');
            document.getElementById('tab-register').classList.add('text-gray-600');
            document.getElementById('tab-forgot').classList.add('text-gray-600');

            // Show selected content
            if (tab === 'login') {
                document.getElementById('login-content').classList.remove('hidden');
                document.getElementById('tab-login').classList.remove('text-gray-600');
                document.getElementById('tab-login').classList.add('bg-teal-600', 'text-white');
            } else if (tab === 'register') {
                document.getElementById('register-content').classList.remove('hidden');
                document.getElementById('tab-register').classList.remove('text-gray-600');
                document.getElementById('tab-register').classList.add('bg-teal-600', 'text-white');
            } else if (tab === 'forgot') {
                document.getElementById('forgot-content').classList.remove('hidden');
                document.getElementById('tab-forgot').classList.remove('text-gray-600');
                document.getElementById('tab-forgot').classList.add('bg-teal-600', 'text-white');
                goToForgotStep1();
            }
        }

        function togglePassword(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            if (input.type === 'password') {
                input.type = 'text';
                eye.classList.remove('fa-eye');
                eye.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                eye.classList.remove('fa-eye-slash');
                eye.classList.add('fa-eye');
            }
        }

        function goToForgotStep2() {
            document.getElementById('forgot-step-1').classList.add('hidden');
            document.getElementById('forgot-step-2').classList.remove('hidden');
        }

        function goToForgotStep1() {
            document.getElementById('forgot-step-1').classList.remove('hidden');
            document.getElementById('forgot-step-2').classList.add('hidden');
        }

        function showAlert(message) {
            alert(message);
        }
    </script>
</body>
</html>
