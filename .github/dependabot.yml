version: 2
updates:
  # Backend (NestJS)
  - package-ecosystem: "npm"
    directory: "/Backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"

  # Admin Panel (Next.js)
  - package-ecosystem: "npm"
    directory: "/Frontend/Admi-Panel"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"

  # User UI
  - package-ecosystem: "npm"
    directory: "/Frontend/User-UI"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # Mobile App (Flutter/Dart)
  - package-ecosystem: "pub"
    directory: "/kryros_mobile_app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "mobile"

  # Admin Mobile App (Flutter/Dart)
  - package-ecosystem: "pub"
    directory: "/kryros_admin_app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "mobile"
