services:
  postgres_db:
    image: postgres:16-alpine
    container_name: production_db
    restart: always
    environment:
      POSTGRES_USER: kryros_admin
      POSTGRES_PASSWORD: "@0969597029Golden"
      POSTGRES_DB: kryros_prod_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nestjs_api:
    image: node:20-alpine
    container_name: nestjs_backend
    restart: always
    working_dir: /app
    ports:
      - "80:3000"
    volumes:
      - .:/app
    environment:
      NODE_ENV: production
      JWT_SECRET: "kryros_super_secret_2026_change_me"
      DATABASE_URL: "postgres://kryros_admin:%400969597029Golden@postgres_db:5432/kryros_prod_db"
      TZ: "Africa/Lagos"
    command: sh -c "npm install --include=dev && npm run build && npm run start:prod"
    depends_on:
      - postgres_db

volumes:
  pgdata:
